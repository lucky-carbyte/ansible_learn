---
all:
  vars:
    # Use 'lab' as the SSH user for all hosts
    ansible_user: lab

    # Enable sudo (privilege escalation)
    ansible_become: true
    ansible_become_method: sudo
    ansible_become_user: root

    # default python setup
    ansible_python_interpreter: /usr/bin/python

    # If 'lab' requires a sudo password, it is best practice to
    # pass it via --ask-become-pass at runtime, but for
    # automated environments, it can be defined here:
    # ansible_become_password: "{{ vault_sudo_password }}"

  children:
    rpi_servers:
      hosts:
        comp10.nue1-lab.luckyh.de:
        comp11.nue1-lab.luckyh.de:
