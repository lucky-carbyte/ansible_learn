---
- name: Update alle Debian LXC Container
  hosts: docker
  become: yes
  gather_facts: no  # Beschleunigt den Start, da Facts oft nicht nötig sind

  tasks:
    - name: Update apt cache und führe Full Upgrade durch
      apt:
        update_cache: yes
        upgrade: dist
        force_apt_get: yes
        autoremove: yes
        autoclean: yes

    - name: Prüfen, ob ein Neustart erforderlich ist
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Container neustarten (falls nötig)
      reboot:
        msg: "Ansible triggered reboot nach Kernel/System-Update"
      when: reboot_required.stat.exists
