---
- name: Proxmox Host für Docker LXC Support konfigurieren
  hosts: pve
  become: yes
  tasks:
    - name: Kernel-Module permanent laden (nach Reboot)
      copy:
        dest: /etc/modules-load.d/docker-lxc-support.conf
        content: |
          overlay
          br_netfilter
          vxlan
          ip_vs
          ip_vs_rr
          ip_vs_wrr
          ip_vs_sh
          nf_conntrack
        mode: '0644'

    - name: Module sofort in den laufenden Kernel laden
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
        - vxlan
        - ip_vs
        - ip_vs_rr

    - name: IP-Forwarding auf dem Host aktivieren
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes

    - name: Bridge-Netfilter für iptables aktivieren
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-arptables
        - net.bridge.bridge-nf-call-ip6tables

    - name: Verifiziere geladene Module
      shell: lsmod | grep -E 'br_netfilter|overlay|vxlan'
      register: modules_check
      changed_when: false

    - name: Status ausgeben
      debug:
        msg: "Geladene Module: {{ modules_check.stdout }}"
